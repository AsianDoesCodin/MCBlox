<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico">

  <title>Profile — McBlox</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="toast.js"></script>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="index.html" class="logo"><img src="mcbloxlogo.png" alt="McBlox" class="nav-logo"></a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="publish.html">Publish</a>
      <a href="guide.html">Guide</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="https://discord.gg/utRqFy3ptE" target="_blank" rel="noopener" class="nav-discord"><svg width="18" height="18" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg> Discord</a>
    </div>
    <div class="nav-right">
      <button class="btn btn-sm" id="auth-btn">Sign In</button>
    </div>
  </nav>

  <!-- Auth gate -->
  <div id="auth-gate" class="auth-gate">
    <h2>Profile</h2>
    <p class="auth-gate-sub">Sign in to view your profile.</p>
    <button class="btn btn-lg" id="signin-btn">Sign In</button>
  </div>

  <!-- Profile content -->
  <main id="profile-panel" style="display:none">
    <div class="profile-container">
      <h1 class="profile-title">My Profile</h1>

      <div class="profile-card">
        <!-- Avatar -->
        <div class="profile-avatar-section">
          <div class="profile-avatar" id="profile-avatar">
            <span id="avatar-placeholder">?</span>
            <img id="avatar-img" style="display:none">
          </div>
          <label class="btn btn-sm btn-secondary profile-avatar-btn">
            Change Avatar
            <input type="file" id="avatar-input" accept="image/*" style="display:none">
          </label>
        </div>

        <!-- Fields -->
        <form id="profile-form" class="profile-fields">
          <label>Username</label>
          <input type="text" id="profile-username" required maxlength="30" placeholder="Your username">

          <label>Email</label>
          <input type="email" id="profile-email" disabled>

          <label>Member Since</label>
          <input type="text" id="profile-joined" disabled>

          <button type="submit" class="btn btn-md" id="profile-save">Save Changes</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 McBlox</p>
  </footer>

  <style>
    .profile-container {
      max-width: 520px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .profile-title {
      font-family: 'Silkscreen', monospace;
      font-size: 22px;
      margin-bottom: 24px;
      color: #ffd740;
    }
    .profile-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 28px;
    }
    .profile-avatar-section {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #111827;
      border: 3px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #avatar-placeholder {
      font-size: 28px;
      color: var(--text-dim);
      font-family: 'Silkscreen', monospace;
    }
    .profile-avatar-btn {
      cursor: pointer;
    }
    .profile-fields label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      margin-top: 14px;
    }
    .profile-fields label:first-child {
      margin-top: 0;
    }
    .profile-fields input {
      width: 100%;
      padding: 10px 14px;
      background: #0a0e1a;
      border: 2px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .profile-fields input:focus {
      border-color: var(--accent);
    }
    .profile-fields input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #profile-save {
      margin-top: 24px;
      width: 100%;
    }
  </style>

  <script src="profile.js"></script>
</body>
</html>
