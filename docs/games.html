  <main>
    <div class="page-header">
      <h1>Games</h1>
    </div>

    <div class="catalog-bar">
      <input type="text" class="search-input" id="search" placeholder="Search games...">
      <select class="filter-select" id="sort">
        <option value="popular">Most Popular</option>
        <option value="active">Current Players</option>
        <option value="top-rated">Top Rated</option>
        <option value="newest">Newest</option>
        <option value="featured">Featured</option>
      </select>
      <div class="tag-dropdown-wrap" id="tag-dropdown-wrap">
        <button class="filter-select tag-toggle-btn" id="tag-toggle-btn">Tags</button>
        <div class="tag-dropdown" id="tag-dropdown" style="display:none">
          <div class="type-filter-bar" id="type-filter-bar">
            <button class="tag-filter-btn active" data-type="all">All</button>
            <button class="tag-filter-btn" data-type="server">Multiplayer</button>
            <button class="tag-filter-btn" data-type="world">Singleplayer</button>
          </div>
          <div class="tag-filter-bar" id="tag-filter-bar"></div>
          <button class="tag-clear-btn" id="tag-clear-btn" style="display:none">Clear all</button>
        </div>
      </div>
    </div>

    <section class="featured" id="featured-section">
      <h2>Featured</h2>
      <div class="featured-grid" id="featured-grid"></div>
    </section>

    <div class="game-grid" id="game-grid"></div>

    <div class="empty-state" id="empty" style="display:none">
      <p>No games yet. Be the first to publish one!</p>
    </div>
  </main>
