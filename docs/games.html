  <div class="right">
    <div style="position:relative;display:flex;align-items:center;gap:8px;" id="auth-wrap">
      <a class="btn btn-sm btn-warm" id="publish-nav-btn" href="publish.html">+ Publish</a>
      <button class="btn btn-sm btn-ghost" id="auth-btn" onclick="showAuthModal()">Sign In</button>

      <div class="user-dropdown" id="user-dropdown"></div>
    </div>
  </div>

<div class="content">
  <h1 style="font-size:24px;font-weight:700;margin-bottom:16px;">Games</h1>

  <div class="catalog-bar">
    <input type="text" class="search-input" id="search" placeholder="Search games...">
    <select class="sort-select" id="sort">
      <option value="popular">Most Popular</option>
      <option value="active">Current Players</option>
      <option value="top-rated">Top Rated</option>
      <option value="newest">Newest</option>
    </select>
    <div class="tag-filter-wrap">
      <button class="btn btn-sm btn-ghost tag-toggle" id="tag-toggle-btn">Tags</button>
      <div class="tag-dropdown" id="tag-dropdown">
        <div class="type-btns" id="type-btns">
          <button class="tag-pill active" data-type="all">All</button>
          <button class="tag-pill" data-type="server">Multiplayer</button>
          <button class="tag-pill" data-type="world">Singleplayer</button>
        </div>
        <div class="tag-pills" id="tag-pills"></div>
        <button class="tag-clear-btn" id="tag-clear-btn" style="display:none">Clear all</button>
      </div>
    </div>
  </div>

  <!-- Featured carousel -->
  <div id="featured-section" style="display:none">
    <div class="section-head"><div class="section-title">⭐ Featured</div></div>
    <div class="featured-carousel" id="featured-carousel"></div>
    <div class="featured-dots" id="featured-dots"></div>
  </div>

  <div class="game-grid" id="game-grid"></div>
  <div class="empty-state" id="empty" style="display:none">No games found.</div>
</div>
