<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game — McBlox</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="toast.js"></script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <a class="logo" href="index.html">
    <img src="mcbloxlogo2.png" alt="McBlox">
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="guide.html">Guide</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="https://discord.gg/utRqFy3ptE" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:4px;">
      <svg width="14" height="14" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
      Discord
    </a>
  </nav>
  <div class="right">
    <div style="position:relative;display:flex;align-items:center;gap:8px;" id="auth-wrap">
      <a class="btn btn-sm btn-warm" id="publish-nav-btn" href="publish.html">+ Publish</a>
      <button class="btn btn-sm btn-ghost" id="auth-btn" onclick="showAuthModal()">Sign In</button>
      <div class="avatar" id="nav-avatar" style="display:none;"></div>
      <div class="user-dropdown" id="user-dropdown"></div>
    </div>
  </div>
</div>

<div class="content">
  <!-- Loading state -->
  <div class="page-loading" id="game-loading"><div class="spinner"></div>Loading...</div>

  <!-- Not found state -->
  <div id="game-not-found" style="display:none" class="empty-state">
    <h2>Game not found</h2>
    <p>This game may have been removed.</p>
    <a class="btn btn-sm btn-ghost" href="games.html">Browse Games</a>
  </div>

  <!-- Game detail -->
  <div id="game-detail" style="display:none">
    <div class="game-banner" id="game-banner"><span class="placeholder">⛏</span></div>

    <div class="game-detail-layout">
      <div class="game-main">
        <h1 id="game-title"></h1>
        <div class="game-creator">
          <div class="creator-avatar" id="creator-avatar"></div>
          <div>
            <a class="creator-name" id="creator-name" href="#"></a>
            <span class="game-date" id="game-date"></span>
          </div>
        </div>
        <div class="game-description" id="game-description"></div>
        <div class="game-tags" id="game-tags"></div>

        <!-- Screenshots -->
        <div class="screenshots-section" id="screenshots-section" style="display:none">
          <h2>Screenshots</h2>
          <div class="screenshot-gallery" id="screenshot-gallery"></div>
        </div>

        <!-- Comments -->
        <div class="comments-section">
          <h2>Comments</h2>
          <div id="comment-form-wrap"></div>
          <div class="comments-list" id="comments-list">
            <p class="comments-empty" id="comments-empty">No comments yet.</p>
          </div>
        </div>
      </div>

      <div class="game-sidebar">
        <div class="card sidebar-card">
          <div class="sidebar-stat">
            <span class="stat-label">Rating</span>
            <div>
              <div class="rating-bar">
                <span id="rating-up">👍 0</span>
                <span id="rating-down">👎 0</span>
              </div>
              <div class="rating-pct-bar"><div class="rating-pct-fill" id="rating-pct-fill"></div></div>
            </div>
          </div>
          <div class="sidebar-stat"><span class="stat-label">Players</span><span class="stat-value" id="stat-players">0</span></div>
          <div class="sidebar-stat"><span class="stat-label">Total Plays</span><span class="stat-value" id="stat-plays">0</span></div>
          <div class="sidebar-stat"><span class="stat-label">Type</span><span class="stat-value" id="stat-type">—</span></div>
          <div class="sidebar-stat"><span class="stat-label">MC Version</span><span class="stat-value" id="stat-mc">—</span></div>
          <div class="sidebar-stat"><span class="stat-label">Mod Loader</span><span class="stat-value" id="stat-loader">—</span></div>
        </div>
        <div class="sidebar-actions">
          <button class="btn btn-sm btn-mint" id="vote-up-btn">👍 Like</button>
          <button class="btn btn-sm btn-red" id="vote-down-btn">👎 Dislike</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" style="display:none">
  <div class="backdrop" onclick="closeLightbox()"></div>
  <button class="lb-close" onclick="closeLightbox()">&times;</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">&lsaquo;</button>
  <img class="lb-img" id="lb-img" alt="">
  <button class="lb-nav lb-next" onclick="lbNav(1)">&rsaquo;</button>
</div>

<footer>&copy; 2026 McBlox</footer>

<script src="game.js"></script>
</body>
</html>
