<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Admin — McBlox</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="toast.js"></script>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="index.html" class="logo"><img src="mcbloxlogo.png" alt="McBlox" class="nav-logo"></a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="publish.html">Publish</a>
      <a href="guide.html">Guide</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="https://discord.gg/utRqFy3ptE" target="_blank" rel="noopener" class="nav-discord"><svg width="18" height="18" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg> Discord</a>
    </div>
    <div class="nav-right">
      <button class="btn btn-sm" id="auth-btn">Sign In</button>
    </div>
  </nav>

  <!-- Auth gate -->
  <div id="admin-gate" class="auth-gate">
    <h2>Admin Panel</h2>
    <p class="auth-gate-sub">This area is restricted to McBlox admins.</p>
    <button class="btn btn-lg" id="signin-btn">Sign In</button>
  </div>

  <!-- Admin content -->
  <main id="admin-panel" style="display:none">
    <div class="admin-layout">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
          <span class="admin-sidebar-title">Admin</span>
        </div>
        <nav class="admin-sidebar-nav">
          <button class="admin-nav-item active" data-section="games">
            <span class="admin-nav-icon">&#9654;</span>
            <span>Games</span>
          </button>
          <button class="admin-nav-item" data-section="users">
            <span class="admin-nav-icon">&#9787;</span>
            <span>Users</span>
          </button>
          <button class="admin-nav-item" data-section="stats">
            <span class="admin-nav-icon">&#9733;</span>
            <span>Stats</span>
          </button>
        </nav>
      </aside>

      <!-- Main content area -->
      <div class="admin-content">
        <!-- Games Section -->
        <div class="admin-section active" id="section-games">
          <div class="admin-header">
            <h1>Review Queue</h1>
            <div class="admin-stats" id="admin-stats"></div>
          </div>

          <div class="admin-tabs">
            <button class="admin-tab active" data-tab="pending">Pending Review</button>
            <button class="admin-tab" data-tab="approved">Approved</button>
            <button class="admin-tab" data-tab="rejected">Rejected</button>
            <button class="admin-tab" data-tab="all">All Games</button>
          </div>

          <div class="admin-queue" id="admin-queue"></div>
          <div class="empty-state" id="admin-empty" style="display:none">
            <p>No games to review.</p>
          </div>
        </div>

        <!-- Users Section -->
        <div class="admin-section" id="section-users">
          <div class="admin-header">
            <h1>Users</h1>
            <div class="admin-stats" id="user-stats"></div>
          </div>
          <div class="admin-user-search">
            <input type="text" class="search-input" id="user-search" placeholder="Search by username or email...">
          </div>
          <div class="admin-queue" id="user-list"></div>
          <div class="empty-state" id="user-empty" style="display:none">
            <p>No users found.</p>
          </div>
        </div>

        <!-- Stats Section -->
        <div class="admin-section" id="section-stats">
          <div class="admin-header">
            <h1>Platform Stats</h1>
          </div>
          <div class="stats-grid" id="stats-grid"></div>
        </div>
      </div>
    </div>

    <!-- Review modal -->
    <div class="modal-overlay" id="review-modal" style="display:none">
      <div class="modal review-modal">
        <div class="modal-header">
          <h2>Review Game</h2>
          <button class="modal-close" id="review-close">&times;</button>
        </div>
        <div id="review-content"></div>
        <div class="review-actions">
          <button class="btn btn-approve" id="review-approve">Approve</button>
          <button class="btn btn-reject" id="review-reject">Reject</button>
          <button class="btn" id="review-edit" style="background:#1e3a5f;border-color:#2a4a7f;">&#9999;&#65039; Edit</button>
          <button class="btn btn-secondary" id="review-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>McBlox — Not affiliated with Mojang or Microsoft.</p>
  </footer>

  <script src="admin.js?v=20260411"></script>
</body>
</html>
